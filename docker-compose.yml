# AI Interviewer — local development stack
#
# Prerequisites:
#   1. Copy api/.env.example to api/.env and fill in Supabase + Groq values.
#   2. Optionally copy frontend/.env.example to frontend/.env (defaults work for Docker).
#
# Start:
#   docker compose up --build
#
# App:
#   Frontend: http://localhost:3000
#   API:      http://localhost:8000

services:
  migrate:
    image: postgres:16-alpine
    env_file:
      - api/.env
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./scripts/run-migrations.sh:/run-migrations.sh:ro
    entrypoint: ["/bin/sh", "/run-migrations.sh"]
    restart: "no"

  api:
    build:
      context: ./api
    env_file:
      - api/.env
    environment:
      CORS_ORIGINS: http://localhost:3000
      NLTK_DATA: /app/.nltk_data
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api_nltk_data:/app/.nltk_data
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./frontend
    env_file:
      - path: frontend/.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      api:
        condition: service_healthy

volumes:
  api_nltk_data:
  frontend_node_modules:
  frontend_next:
